name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  build-c-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libcjson-dev

    - name: Build tests
      working-directory: ./tests
      run: make clean && make

    - name: Upload test binaries
      uses: actions/upload-artifact@v4
      with:
        name: c-test-binaries
        path: tests/

  ollama-test:
    runs-on: ubuntu-latest
    needs: build-c-tests
    steps:
    - uses: actions/checkout@v4

    - name: Download test binaries
      uses: actions/download-artifact@v4
      with:
        name: c-test-binaries
        path: tests/

    - name: Run ollama_test
      working-directory: ./tests
      run: |
        chmod +x ./ollama_test
        ./ollama_test

  mutator-test:
    runs-on: ubuntu-latest
    needs: build-c-tests
    steps:
    - uses: actions/checkout@v4

    - name: Download test binaries
      uses: actions/download-artifact@v4
      with:
        name: c-test-binaries
        path: tests/

    - name: Run mutator_test
      working-directory: ./tests
      run: |
        chmod +x ./mutator_test
        ./mutator_test

  python-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock pytest-cov
        pip install -r requirements.txt

    - name: Run Unit Tests
      run: pytest tests/test_afl_wrapper.py tests/test_seed_gen.py tests/test_tmux_ui.py tests/test_vibefuzzer_gui.py -v --tb=short -m "not integration and not system and not interface"

    - name: Run Integration Tests
      continue-on-error: true
      run: pytest tests/test_integration.py -v --tb=short -m integration

    - name: Run System Tests
      continue-on-error: true
      run: pytest tests/test_system.py -v --tb=short -m system

    - name: Run Interface Tests
      continue-on-error: true
      run: pytest tests/test_interface.py -v --tb=short -m interface

    - name: Run All Tests with Coverage
      continue-on-error: true
      run: pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false