name: Run Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libcurl4-openssl-dev libcjson-dev

    - name: Build tests
      working-directory: ./tests
      run: |
        set -e
        make clean && make

    - name: Run ollama_test
      continue-on-error: true
      working-directory: ./tests
      run: |
        set -e
        if [ ! -f ./ollama_test ]; then
          echo "Error: ollama_test executable not found"
          exit 1
        fi
        ./ollama_test

    - name: Run mutator_test
      continue-on-error: true
      working-directory: ./tests
      run: |
        set -e
        if [ ! -f ./mutator_test ]; then
          echo "Error: mutator_test executable not found"
          exit 1
        fi
        ./mutator_test

    - name: Clean up test artifacts
      working-directory: ./tests
      run: make clean

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Python test dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-mock pytest-cov
        pip install -r requirements.txt

    - name: Run Unit Tests
      continue-on-error: true
      run: |
        echo "========================================="
        echo "Running Unit Tests (test_*.py)"
        echo "========================================="
        pytest tests/test_afl_wrapper.py tests/test_seed_gen.py tests/test_tmux_ui.py tests/test_vibefuzzer_gui.py -v --tb=short -m "not integration and not system and not interface"

    - name: Run Integration Tests
      continue-on-error: true
      run: |
        echo "========================================="
        echo "Running Integration Tests"
        echo "========================================="
        pytest tests/test_integration.py -v --tb=short -m integration

    - name: Run System Tests
      continue-on-error: true
      run: |
        echo "========================================="
        echo "Running System Tests (End-to-End)"
        echo "========================================="
        pytest tests/test_system.py -v --tb=short -m system

    - name: Run Interface Tests
      continue-on-error: true
      run: |
        echo "========================================="
        echo "Running Interface Tests (GUI/UI)"
        echo "========================================="
        pytest tests/test_interface.py -v --tb=short -m interface

    - name: Run All Tests with Coverage
      continue-on-error: true
      run: |
        echo "========================================="
        echo "Running All Tests with Coverage Report"
        echo "========================================="
        pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-report=xml

    - name: Upload coverage reports
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
